services:
  angular-frontend:
    image: ${IMAGE_NAME:-samuelgarciaayala/angular-jenkins:latest}
    container_name: angular-frontend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
    ports:
      - "${APP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
